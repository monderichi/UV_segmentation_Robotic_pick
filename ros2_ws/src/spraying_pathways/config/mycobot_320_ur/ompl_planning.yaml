# OMPL planning configuration for myCobot 320 M5 (UR-compatible)
# Note: request_adapters and planning_plugin are set in launch file

planner_configs:
  SBLkConfigDefault:
    type: geometric::SBL
    range: 0.0  # Max motion added to tree. <= 0.0 => use 0.1 rad or 10% of joint range
  ESTkConfigDefault:
    type: geometric::EST
    range: 0.0  # Max motion added to tree. <= 0.0 => use 0.1 rad or 10% of joint range
    goal_bias: 0.05  # Probability of selecting goal state
  LBKPIECEkConfigDefault:
    type: geometric::LBKPIECE
    range: 0.0  # Max motion added to tree. <= 0.0 => use 0.1 rad or 10% of joint range
    border_fraction: 0.9  # Fraction of time to expand lower border
    min_valid_path_fraction: 0.5  # Accept partially valid moves above fraction
  BKPIECEkConfigDefault:
    type: geometric::BKPIECE
    range: 0.0  # Max motion added to tree. <= 0.0 => use 0.1 rad or 10% of joint range
    border_fraction: 0.9  # Fraction of time to expand lower border
    failed_expansion_score_factor: 0.5  # When expansion fails, scale score by factor
    min_valid_path_fraction: 0.5  # Accept partially valid moves above fraction
  KPIECEkConfigDefault:
    type: geometric::KPIECE
    range: 0.0  # Max motion added to tree. <= 0.0 => use 0.1 rad or 10% of joint range
    goal_bias: 0.05  # Probability of selecting goal state
    border_fraction: 0.9  # Fraction of time to expand lower border
    failed_expansion_score_factor: 0.5  # When expansion fails, scale score by factor
  RRTkConfigDefault:
    type: geometric::RRT
    range: 0.0  # Max motion added to tree. <= 0.0 => use 0.1 rad or 10% of joint range
    goal_bias: 0.05  # Probability of selecting goal state
  RRTConnectkConfigDefault:
    type: geometric::RRTConnect
    range: 0.0  # Max motion added to tree. <= 0.0 => use 0.1 rad or 10% of joint range
  RRTstarkConfigDefault:
    type: geometric::RRTstar
    range: 0.0  # Max motion added to tree. <= 0.0 => use 0.1 rad or 10% of joint range
    goal_bias: 0.05  # Probability of selecting goal state
    delay_collision_checking: 1
  TRRTkConfigDefault:
    type: geometric::TRRT
    range: 0.0  # Max motion added to tree. <= 0.0 => use 0.1 rad or 10% of joint range
    goal_bias: 0.05  # Probability of selecting goal state
    temp_change_factor: 2.0  # Factor by which temperature is increased
    init_temperature: 10e-10
    final_temperature: 10e-10
  PRMkConfigDefault:
    type: geometric::PRM
    max_nearest_neighbors: 10
  PRMstarkConfigDefault:
    type: geometric::PRMstar
  FMTkConfigDefault:
    type: geometric::FMT
    num_samples: 1000
    radius_multiplier: 1.1
    nearest_k: 1
    cache_cc: 1
    heuristics: 0
    extended_fmt: 1
  BFMTkConfigDefault:
    type: geometric::BFMT
    num_samples: 1000
    radius_multiplier: 1.1
    nearest_k: 1
    cache_cc: 1
    heuristics: 0
    extended_fmt: 1
  PDSTkConfigDefault:
    type: geometric::PDST
  STRIDEkConfigDefault:
    type: geometric::STRIDE
    range: 0.0  # Max motion added to tree. <= 0.0 => use 0.1 rad or 10% of joint range
    degree: 16
    max_degree: 18
    min_degree: 12
    projection_evaluator: joint_state
    importance_balance: 0.01
  BiTRRTkConfigDefault:
    type: geometric::BiTRRT
    range: 0.0  # Max motion added to tree. <= 0.0 => use 0.1 rad or 10% of joint range
    temp_change_factor: 0.1
    init_temperature: 100
    frountier_threshold: 0.0
    frountier_node_ratio: 0.1
    cost_threshold: 1e300
  LBTRRTkConfigDefault:
    type: geometric::LBTRRT
    range: 0.0  # Max motion added to tree. <= 0.0 => use 0.1 rad or 10% of joint range
    goal_bias: 0.05
    epsilon: 0.4
  BiESTkConfigDefault:
    type: geometric::BiEST
    range: 0.0  # Max motion added to tree. <= 0.0 => use 0.1 rad or 10% of joint range
  ProjESTkConfigDefault:
    type: geometric::ProjEST
    range: 0.0  # Max motion added to tree. <= 0.0 => use 0.1 rad or 10% of joint range
    goal_bias: 0.05
  LazyPRMkConfigDefault:
    type: geometric::LazyPRM
    range: 0.0  # Max motion added to tree. <= 0.0 => use 0.1 rad or 10% of joint range
  LazyPRMstarkConfigDefault:
    type: geometric::LazyPRMstar
  SPARSkConfigDefault:
    type: geometric::SPARS
    stretch_factor: 3.0
    sparse_delta_fraction: 0.25
    dense_delta_fraction: 0.001
    max_failures: 1000
  SPARStwokConfigDefault:
    type: geometric::SPARStwo
    stretch_factor: 3.0
    sparse_delta_fraction: 0.25
    dense_delta_fraction: 0.001
    max_failures: 5000

ur_manipulator:
  planner_configs:
    - SBLkConfigDefault
    - ESTkConfigDefault
    - LBKPIECEkConfigDefault
    - BKPIECEkConfigDefault
    - KPIECEkConfigDefault
    - RRTkConfigDefault
    - RRTConnectkConfigDefault
    - RRTstarkConfigDefault
    - TRRTkConfigDefault
    - PRMkConfigDefault
    - PRMstarkConfigDefault
    - FMTkConfigDefault
    - BFMTkConfigDefault
    - PDSTkConfigDefault
    - STRIDEkConfigDefault
    - BiTRRTkConfigDefault
    - LBTRRTkConfigDefault
    - BiESTkConfigDefault
    - ProjESTkConfigDefault
    - LazyPRMkConfigDefault
    - LazyPRMstarkConfigDefault
    - SPARSkConfigDefault
    - SPARStwokConfigDefault
  projection_evaluator: joints(shoulder_pan_joint,shoulder_lift_joint)
  longest_valid_segment_fraction: 0.01
