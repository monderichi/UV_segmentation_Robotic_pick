# Kinematics solver configuration for myCobot 320 M5 (UR-compatible)
# Uses KDL kinematics plugin with UR-standard joint names
# Planning group: ur_manipulator
# Standard ROS2 parameter format (matches ur_moveit_config)

/**:
  ros__parameters:
    robot_description_kinematics:
      ur_manipulator:
        kinematics_solver: kdl_kinematics_plugin/KDLKinematicsPlugin
        kinematics_solver_search_resolution: 0.005
        kinematics_solver_timeout: 0.05
        position_only_ik: false
        kinematics_solver_attempts: 5
